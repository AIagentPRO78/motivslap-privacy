# Deliberately privileged pod with hostPath and excess capabilities.
# /cloud-audit + kubescape should flag this as a critical workload finding.
apiVersion: v1
kind: Pod
metadata:
  name: lab-privileged
  namespace: default
  annotations:
    redstack.lab/intentionally-vulnerable: "true"
  labels:
    app: lab-privileged
spec:
  serviceAccountName: lab-overbroad-sa
  hostNetwork: true
  hostPID: true
  containers:
    - name: privileged
      image: alpine:3.20
      command: ["sh", "-c", "sleep infinity"]
      securityContext:
        privileged: true
        allowPrivilegeEscalation: true
        runAsUser: 0
        capabilities:
          add: ["ALL"]
      volumeMounts:
        - name: host-root
          mountPath: /host
  volumes:
    - name: host-root
      hostPath:
        path: /
        type: Directory
